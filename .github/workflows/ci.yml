name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build (${{ matrix.config }})
    runs-on: windows-2022
    strategy:
      fail-fast: false
      matrix:
        config: [Debug, Release]

    steps:
      - uses: actions/checkout@v4

      - name: Add MSBuild to PATH
        uses: microsoft/setup-msbuild@v2

      - name: Build
        run: msbuild steam-tracer-cleaner.sln /p:Configuration=${{ matrix.config }} /p:Platform=x64 /m

      - name: Upload artifact
        if: matrix.config == 'Release'
        uses: actions/upload-artifact@v4
        with:
          name: steam-tracer-cleaner-${{ github.sha }}
          path: build/Release/steam-tracer-cleaner.exe
          if-no-files-found: error
